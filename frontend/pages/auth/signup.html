<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signup</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/auth.css" />

  <!-- AUTH JS -->
  <script src="../../js/auth.js"></script>

  <script>
    requireGuest();
  </script>
</head>

<body class="auth-page">

  <div class="auth-container">

    <h2>Create Account</h2>

    <!-- MESSAGE BOX -->
    <div id="message" class="message" style="display:none;"></div>

    <form onsubmit="signup(event)">

      <div class="form-group">
        <input
          type="text"
          id="username"
          placeholder="Username"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="email"
          id="email"
          placeholder="Email"
          required
        />
      </div>

      <div class="form-group">
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
        />
      </div>

      <button type="submit" class="auth-btn">
        Signup
      </button>

    </form>

    <p>
      Already have an account?
      <a href="login.html">Login</a>
    </p>

    <div class="divider">OR</div>

    <!-- GOOGLE SIGNUP BUTTON -->
    <a href="http://localhost:5000/api/auth/google" class="google-login-btn">

      <span class="google-icon">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335"
            d="M24 9.5c3.2 0 6.1 1.1 8.4 3.3l6.3-6.3C34.7 2.3 29.7 0 24 0 14.6 0 6.6 5.5 2.7 13.4l7.3 5.7C12 13.3 17.5 9.5 24 9.5z"/>
          <path fill="#4285F4"
            d="M46.1 24.5c0-1.6-.1-3.2-.4-4.7H24v9h12.4c-.5 2.7-2 5-4.2 6.5l6.6 5.1c3.9-3.6 6.3-8.9 6.3-15.9z"/>
          <path fill="#FBBC05"
            d="M10 28.9c-.5-1.4-.8-2.9-.8-4.4s.3-3 .8-4.4l-7.3-5.7C.9 17.4 0 20.6 0 24s.9 6.6 2.7 9.6l7.3-5.7z"/>
          <path fill="#34A853"
            d="M24 48c6.5 0 12-2.1 16-5.7l-6.6-5.1c-2 1.4-4.6 2.3-9.4 2.3-6.5 0-12-3.8-14-9.6l-7.3 5.7C6.6 42.5 14.6 48 24 48z"/>
        </svg>
      </span>

      <span class="google-text">Sign up with Google</span>

    </a>

  </div>

</body>
</html>
