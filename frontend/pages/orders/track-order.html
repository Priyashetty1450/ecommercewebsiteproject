<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Order</title>

<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/ii.css">
<link rel="stylesheet" href="/css/pages/track-order.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body>

<div id="header"></div>

<div class="track-container">

<div class="track-header">
<h1>Track Your Order</h1>
<p>Enter your order ID to track the status</p>
</div>

<div class="track-form">

<div class="input-group">
<input type="email" id="emailInput" placeholder="Enter your email">
</div>

<div class="input-group">
<input type="text" id="orderIdInput" placeholder="Enter Order ID">

<button class="track-btn" onclick="trackOrder()">
Track Order
</button>
</div>

</div>

<!-- LOADER -->

<div id="loader" class="loader" style="display:none">
Loading order details...
</div>

<!-- ERROR -->

<div class="error-message" id="errorMessage" style="display:none"></div>

<!-- RESULT -->

<div class="order-result" id="orderResult" style="display:none">

<div class="order-info">

<h2>Order Details</h2>

<div class="info-grid">

<div><label>Order ID</label><span id="resultOrderId"></span></div>
<div><label>Name</label><span id="resultCustomer"></span></div>
<div><label>Date</label><span id="resultDate"></span></div>
<div><label>Total</label><span id="resultTotal"></span></div>
<div><label>Products</label><span id="resultProducts"></span></div>
<div><label>Qty</label><span id="resultQuantity"></span></div>

</div>

<div id="shippingAddressSection" style="display:none">
<h4>Shipping Address</h4>
<p id="resultAddress"></p>
</div>

</div>

<div class="status-timeline">

<h3>Order Status</h3>

<div class="timeline" id="statusTimeline"></div>

</div>

</div>

</div>

<script src="/js/loadHeader.js"></script>

<script>

const API_BASE = "/api";

const loader = document.getElementById("loader");
const errorBox = document.getElementById("errorMessage");
const resultBox = document.getElementById("orderResult");

/* ================= UI STATES ================= */

function showLoader(){
loader.style.display="block";
resultBox.style.display="none";
errorBox.style.display="none";
}

function showError(msg){
loader.style.display="none";
errorBox.style.display="block";
errorBox.innerText=msg;
}

function showResult(){
loader.style.display="none";
resultBox.style.display="block";
}

/* ================= TRACK ORDER ================= */

async function trackOrder(){

const email = document.getElementById("emailInput").value.trim();
const orderId = document.getElementById("orderIdInput").value.trim();

if(!orderId){
return showError("Enter Order ID");
}

showLoader();

try{

const res = await fetch(`${API_BASE}/orders/track/${orderId}`);

if(!res.ok){
return showError("Order not found");
}

const order = await res.json();

renderOrder(order);

showResult();

}catch(err){

console.error(err);
showError("Server error");

}

}

/* ================= RENDER ORDER ================= */

function renderOrder(order){

document.getElementById("resultOrderId").innerText = order.orderId;

document.getElementById("resultCustomer").innerText = order.customer;

document.getElementById("resultDate").innerText =
new Date(order.createdAt).toLocaleDateString("en-IN");

document.getElementById("resultTotal").innerText = "₹" + order.total;

document.getElementById("resultProducts").innerText =
order.items.map(i=>i.name).join(", ");

document.getElementById("resultQuantity").innerText =
order.items.reduce((sum,i)=>sum+i.quantity,0);

/* ADDRESS */

if(order.shippingAddress){

document.getElementById("shippingAddressSection").style.display="block";

document.getElementById("resultAddress").innerText =
`${order.shippingAddress.street},
${order.shippingAddress.city},
${order.shippingAddress.state}
- ${order.shippingAddress.zipCode}`;

}

/* TIMELINE */

renderTimeline(order.status);

}

/* ================= TIMELINE ================= */

function renderTimeline(status){

const steps = [
"Order Placed",
"Order Packed",
"Order Shipped",
"Out for Delivery",
"Delivered"
];

const timeline = document.getElementById("statusTimeline");

timeline.innerHTML="";

const index = steps.indexOf(status);

/* progress class for colored line */

timeline.className =
"timeline progress-" + (index >= 0 ? index + 1 : 1);

/* create steps */

steps.forEach(step=>{

const div = document.createElement("div");

div.className="timeline-step";

if(steps.indexOf(step) <= index){
div.classList.add("active");
}

div.innerHTML = `<p>${step}</p>`;

timeline.appendChild(div);

});

}

/* ================= AUTO LOAD FROM SUCCESS PAGE ================= */

window.addEventListener("load",()=>{

const params = new URLSearchParams(window.location.search);

const orderId = params.get("orderId");

if(orderId){

document.getElementById("orderIdInput").value = orderId;

trackOrder();

}

});

</script>

<div id="footer"></div>

<script src="/js/loadFooter.js"></script>

</body>
</html>
