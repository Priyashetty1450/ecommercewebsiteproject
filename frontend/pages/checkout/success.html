<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Success</title>

<link rel="stylesheet" href="../../css/ii.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
font-family:Segoe UI;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.success-container{
background:#fff;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:520px;
width:100%;
text-align:center;
}

.success-icon{
width:90px;
height:90px;
background:#28a745;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 20px;
}

.success-icon i{font-size:40px;color:white;}

.order-details{
background:#f8f9fa;
padding:20px;
border-radius:10px;
margin:25px 0;
text-align:left;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#8B4513;
color:white;
border-radius:8px;
text-decoration:none;
margin:5px;
font-weight:600;
}

.btn-secondary{background:#6c757d;}

.loader{
text-align:center;
padding:40px;
}
</style>
</head>

<body>

<div class="success-container">

<div id="loader" class="loader">Loading order...</div>

<div id="successBox" style="display:none">

<div class="success-icon">
<i class="fa fa-check"></i>
</div>

<h1>Order Placed Successfully!</h1>
<p>Thank you for shopping with us 🎉</p>

<div class="order-details">
<p><strong>Order ID:</strong> <span id="orderId"></span></p>
<p><strong>Transaction ID:</strong> <span id="transactionId"></span></p>
<p><strong>Amount:</strong> ₹<span id="amount"></span></p>
<p><strong>Payment Method:</strong> <span id="paymentMethod"></span></p>
<p><strong>Date:</strong> <span id="date"></span></p>
</div>

<a href="../home/Landing.html" class="btn">Continue Shopping</a>
<a href="../orders/track-order.html" class="btn btn-secondary">Track Order</a>

</div>

</div>

<script>

const API_BASE = "http://localhost:5000/api";

const params = new URLSearchParams(window.location.search);
const orderId = params.get("orderId");

/* ================= LOAD ORDER ================= */

async function loadOrder() {

  if (!orderId) {
    alert("Invalid order access");
    window.location.href = "../home/Landing.html";
    return;
  }

  try {

    const res = await fetch(
      `${API_BASE}/orders/track/${orderId}`,
      {
        headers: {
          Authorization: `Bearer ${localStorage.getItem("token")}`
        }
      }
    );

    if (!res.ok) throw new Error();

    const data = await res.json();

    document.getElementById("loader").style.display = "none";
    document.getElementById("successBox").style.display = "block";

    document.getElementById("orderId").innerText = data.orderId;

    document.getElementById("transactionId").innerText =
      data.transactionId || "COD";

    document.getElementById("amount").innerText = data.total;

    document.getElementById("paymentMethod").innerText =
      data.paymentMethod.replaceAll("_"," ").toUpperCase();

    document.getElementById("date").innerText =
      new Date(data.createdAt).toLocaleDateString("en-IN",{
        year:"numeric",
        month:"long",
        day:"numeric"
      });

    /* CLEAR CART AFTER SUCCESS */
    localStorage.removeItem("cart");

  } catch {

    alert("Failed to load order");

    window.location.href = "../home/Landing.html";
  }
}

/* ================= INIT ================= */

loadOrder();

</script>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD FOOTER -->
<script src="../../js/loadFooter.js"></script>

</body>
</html>
