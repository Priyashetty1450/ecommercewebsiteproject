<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Failed</title>

<link rel="stylesheet" href="../../css/ii.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
font-family:Segoe UI;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.failure-container{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:520px;
width:100%;
text-align:center;
}

.failure-icon{
width:90px;
height:90px;
background:#dc3545;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 20px;
}

.failure-icon i{font-size:40px;color:white;}

.error-details{
background:#f8f9fa;
padding:20px;
border-radius:10px;
margin:25px 0;
text-align:left;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#8B4513;
color:white;
border-radius:8px;
text-decoration:none;
margin:5px;
font-weight:600;
}

.btn-secondary{background:#6c757d;}

.loader{
text-align:center;
padding:40px;
}
</style>
</head>

<body>

<div class="failure-container">

<div id="loader" class="loader">Loading details...</div>

<div id="failureBox" style="display:none">

<div class="failure-icon">
<i class="fa fa-times"></i>
</div>

<h1>Payment Failed</h1>
<p>Your transaction could not be completed.</p>

<div class="error-details">
<p><strong>Error Code:</strong> <span id="errorCode"></span></p>
<p><strong>Description:</strong> <span id="errorDescription"></span></p>
<p><strong>Order ID:</strong> <span id="orderId"></span></p>
<p><strong>Amount:</strong> ₹<span id="amount"></span></p>
<p><strong>Date:</strong> <span id="date"></span></p>
</div>

<a id="retryBtn" class="btn">Try Again</a>

<a href="../home/Landing.html" class="btn btn-secondary">
Continue Shopping
</a>

</div>

</div>

<script>

const API_BASE = "http://localhost:5000/api";

const params = new URLSearchParams(window.location.search);

const orderId = params.get("orderId");
const amount = params.get("amount");
const errorCode = params.get("errorCode") || "PAYMENT_FAILED";
const errorDescription =
params.get("errorDescription") || "Transaction declined";

function initUI() {

document.getElementById("loader").style.display = "none";
document.getElementById("failureBox").style.display = "block";

document.getElementById("orderId").innerText = orderId || "N/A";
document.getElementById("amount").innerText = amount || "0";
document.getElementById("errorCode").innerText = errorCode;
document.getElementById("errorDescription").innerText = errorDescription;

document.getElementById("date").innerText =
new Date().toLocaleDateString("en-IN",{
year:"numeric",month:"long",day:"numeric"
});

/* RETRY BUTTON */
const retryBtn = document.getElementById("retryBtn");

if (orderId) {
retryBtn.href = `../checkout/checkout.html?retryOrder=${orderId}`;
} else {
retryBtn.href = "../checkout/checkout.html";
}

}

/* VERIFY ORDER */
async function verifyOrder() {

if (!orderId) {
initUI();
return;
}

try {

const res = await fetch(`${API_BASE}/orders/${orderId}`);

if (!res.ok) {
initUI();
return;
}

const data = await res.json();

/* If already paid → redirect to success */
if (data.order.paymentStatus === "paid") {
window.location.href =
`../checkout/success.html?orderId=${orderId}`;
return;
}

initUI();

} catch {
initUI();
}

}

verifyOrder();

</script>


<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD FOOTER -->
<script src="../../js/loadFooter.js"></script>

</body>
</html>
