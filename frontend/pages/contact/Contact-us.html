<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Shri Manjunatha</title>

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="../../css/main.css">
<link rel="stylesheet" href="../../css/ii.css">
<link rel="stylesheet" href="../../css/contact.css">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- GLOBAL HEADER -->

<div id="header"></div>

<!-- CONTACT SECTION -->

<div style="max-width:600px; margin:60px auto; padding:20px;">

<h1>Contact Us</h1>

<p>
You can reach us at <b>wedding@sanskaridecor.com</b><br>
Phone: <b>987654XXXX</b>
</p>

<form class="contact-form">

<label>First Name</label> <input type="text" name="firstName" required>

<label>Last Name</label> <input type="text" name="lastName" required>

<label>Email</label> <input type="email" name="email" required>

<label>Subject</label> <input type="text" name="subject" required>

<label>Phone</label> <input type="tel" name="phone" required>

<label>Message</label>

<textarea name="message" rows="5" required></textarea>

<br><br>

<button type="submit">Submit</button>

</form>

</div>

<!-- LOAD HEADER -->

<script src="../../js/loadHeader.js"></script>

<script>
const API_BASE = "http://localhost:5000/api";

document.querySelector(".contact-form")
.addEventListener("submit", async (e) => {

e.preventDefault();

const formData = new FormData(e.target);
const data = Object.fromEntries(formData.entries());

try {

const res = await fetch(`${API_BASE}/contact`, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(data)
});

const result = await res.json();

if(res.ok){
alert("Message sent successfully!");
e.target.reset();
}else{
alert(result.message || "Something went wrong");
}

}catch{
alert("Server error");
}

});
</script>

<!-- FOOTER -->

<div id="footer"></div>

<script src="../../js/loadFooter.js"></script>

</body>
</html>
