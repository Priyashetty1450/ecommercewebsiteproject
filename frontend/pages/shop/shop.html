<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description"
    content="Shri Manjunatha Shamiyana Works & Events – Shop our collection">

  <!-- CSS -->
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/ii.css">
  <link rel="stylesheet" href="../../css/pages/shop.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <title>Shri Manjunatha - Shop</title>
</head>

<body>

<!-- GLOBAL NAVBAR -->
<div id="header"></div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="filterItems('all', event)">All Products</button>
  <button class="filter-btn" onclick="filterItems('mural', event)">Wall Murals</button>
  <button class="filter-btn" onclick="filterItems('stage', event)">Stage Decor</button>
  <button class="filter-btn" onclick="filterItems('furniture', event)">Furniture</button>
</div>

<!-- PRODUCT SECTION -->
<div class="container">
  <div class="product-grid" id="products-container">
    <div class="loading">Loading products...</div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="overlay" id="pModal">
  <div class="modal">

    <span class="close" onclick="closeModal('pModal')">&times;</span>

    <img id="mImg" class="pop-img">

    <h2 id="mTitle"></h2>
    <p id="mPrice"></p>
    <p id="mDesc"></p>

    <div class="modal-qty">
      <label>Qty:</label>
      <input type="number" id="mQty" value="1" min="1">
      <button class="btn-add" onclick="addToCart()">Add to Cart</button>
    </div>

  </div>
</div>

<!-- CART MODAL -->
<div class="overlay" id="cModal">
  <div class="modal">

    <span class="close" onclick="closeModal('cModal')">&times;</span>

    <h2>Inquiry List</h2>

    <div id="cart-list"></div>

    <div class="cart-total-box">
      <span>Total:</span>
      <span id="cart-total">₹0</span>
    </div>

    <button class="btn-wa" onclick="sendWhatsApp()">
      Finalize via WhatsApp
    </button>

  </div>
</div>

<!-- LOAD HEADER -->
<script src="../../js/loadHeader.js"></script>

<!-- SHOP JS -->
<script src="../../js/shop.js"></script>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD FOOTER -->
<script src="../../js/loadFooter.js"></script>

</body>
</html>
