<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complete Collection | Shri Manjunatha</title>

<!-- GLOBAL CSS -->
<link rel="stylesheet" href="../../css/main.css">
<link rel="stylesheet" href="../../css/ii.css">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* HERO */
.collection-hero{
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url("../../assets/images/decoration.jpg") center/cover;
color:#fff;
text-align:center;
padding:100px 20px;
}

.collection-hero h1{
font-size:42px;
margin-bottom:10px;
}

/* GRID */
.collection-container{
width:90%;
margin:50px auto;
}

.collection-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */
.collection-card{
background:#fff;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.collection-card:hover{
transform:translateY(-6px);
}

.collection-card img{
width:100%;
height:220px;
object-fit:cover;
}

.collection-info{
padding:15px;
text-align:center;
}

.collection-info h3{
margin-bottom:10px;
color:#8B4513;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 18px;
background:#8B4513;
color:#fff;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.btn:hover{
background:#a0522d;
}

</style>

</head>

<body>

<!-- GLOBAL NAVBAR -->
<div id="header"></div>

<!-- HERO -->
<section class="collection-hero">
<h1>The Complete Collection</h1>
<p>Explore our premium decorative event products</p>
</section>

<!-- COLLECTION GRID -->
<section class="collection-container">

<div class="collection-grid">

<div class="collection-card">
<img src="../../assets/images/wall decore.jpeg">
<div class="collection-info">
<h3>Wall Decor</h3>
<a href="shop.html" class="btn">View Products</a>
</div>
</div>

<div class="collection-card">
<img src="../../assets/images/ShowPiece.jpeg">
<div class="collection-info">
<h3>Showpieces</h3>
<a href="shop.html" class="btn">View Products</a>
</div>
</div>

<div class="collection-card">
<img src="../../assets/images/Tents.jpeg">
<div class="collection-info">
<h3>Tent Works</h3>
<a href="shop.html" class="btn">View Products</a>
</div>
</div>

<div class="collection-card">
<img src="../../assets/images/Furniture.jpeg">
<div class="collection-info">
<h3>Furniture</h3>
<a href="shop.html" class="btn">View Products</a>
</div>
</div>

<div class="collection-card">
<img src="../../assets/images/toranas.webp">
<div class="collection-info">
<h3>Traditional Toranas</h3>
<a href="shop.html" class="btn">View Products</a>
</div>
</div>

<div class="collection-card">
<img src="../../assets/images/homek.jpg">
<div class="collection-info">
<h3>Floral Decoration</h3>
<a href="shop.html" class="btn">View Products</a>
</div>
</div>

</div>

</section>

<!-- LOAD GLOBAL HEADER -->
<script src="../../js/loadHeader.js"></script>

<!-- FOOTER -->
<div id="footer"></div>

<!-- LOAD FOOTER -->
<script src="../../js/loadFooter.js"></script>

</body>
</html>
